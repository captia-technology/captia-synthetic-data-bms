# =============================================================================
# BMS Classrooms — Domain config (override del vendor)
# Default 10 aulas (configurable via BMS_N_AULAS).
# Referencia: vendor/synthetic-generator/config/domains/bms_classrooms/domain.yaml
# =============================================================================

n_aulas: 10

calendar:
  # Calendario lectivo Comunidad Valenciana 2025-2026.
  # Source of truth: extensions/bms_calibration/src/bms_calibration/school_calendar.py:22-27
  # T-PV-09 (cierra L-PV-06): expandidas todas las fechas de los 4 períodos vacacionales
  # oficiales para que el calendar generator del vendor (que solo soporta lista plana
  # de holidays, no rangos `vacations`) las trate como no lectivas.
  school_start_month: 9
  school_end_month: 6
  holidays:
    # Navidad 2025-26 (2025-12-22 -> 2026-01-07)
    - "2025-12-22"
    - "2025-12-23"
    - "2025-12-24"
    - "2025-12-25"
    - "2025-12-26"
    - "2025-12-27"
    - "2025-12-28"
    - "2025-12-29"
    - "2025-12-30"
    - "2025-12-31"
    - "2026-01-01"
    - "2026-01-02"
    - "2026-01-03"
    - "2026-01-04"
    - "2026-01-05"
    - "2026-01-06"
    - "2026-01-07"
    # Fallas (2026-03-14 -> 2026-03-19)
    - "2026-03-14"
    - "2026-03-15"
    - "2026-03-16"
    - "2026-03-17"
    - "2026-03-18"
    - "2026-03-19"
    # Pascua (2026-04-04 -> 2026-04-12)
    - "2026-04-04"
    - "2026-04-05"
    - "2026-04-06"
    - "2026-04-07"
    - "2026-04-08"
    - "2026-04-09"
    - "2026-04-10"
    - "2026-04-11"
    - "2026-04-12"
    # Junio fin curso (2026-06-20 -> 2026-06-30)
    - "2026-06-20"
    - "2026-06-21"
    - "2026-06-22"
    - "2026-06-23"
    - "2026-06-24"
    - "2026-06-25"
    - "2026-06-26"
    - "2026-06-27"
    - "2026-06-28"
    - "2026-06-29"
    - "2026-06-30"
    # Septiembre inicio curso (2026-09-01 -> 2026-09-07)
    - "2026-09-01"
    - "2026-09-02"
    - "2026-09-03"
    - "2026-09-04"
    - "2026-09-05"
    - "2026-09-06"
    - "2026-09-07"

schedule:
  aula_capacity_mean: 28
  aula_capacity_std: 6
  aula_utilization_mean: 0.75
  aula_utilization_std: 0.10
  day_to_day_variability: 0.12
  slots:
    - start: "08:00"
      end: "15:00"
      p_occupancy: 0.85
    - start: "15:00"
      end: "20:00"
      p_occupancy: 0.30

physics:
  outdoor_temp:
    mean_annual: 17.0      # zona climática Csa Valencia
    amplitude: 9.5
    daily_noise_std: 1.0
  indoor:
    initial_temp: 20.5
    thermal_mass: 0.05
    heating_power: 1.0
    cooling_effect: 0.5
  co2:
    base_ppm: 420
    per_person_ppm: 18.5   # ~ASHRAE 62.1 / EN 16798
    decay_rate: 0.03
  humidity:
    base_rh: 50.0
    outdoor_influence: 0.3
  noise:
    base_db: 35.0
    per_person_db: 1.2
  light:
    artificial_lux: 500
    daylight_factor: 0.6
