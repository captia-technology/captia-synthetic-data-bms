# =============================================================================
# BMS Classrooms — Domain config (override del vendor)
# Default 10 aulas (configurable via BMS_N_AULAS).
# Referencia: vendor/synthetic-generator/config/domains/bms_classrooms/domain.yaml
# =============================================================================

n_aulas: 10

calendar:
  # Calendario lectivo Comunidad Valenciana 2025-2026.
  # Source of truth: extensions/bms_calibration/src/bms_calibration/school_calendar.py:22-27
  # T-PV-09 (cierra L-PV-06): expandidas todas las fechas de los 4 períodos vacacionales
  # oficiales para que el calendar generator del vendor (que solo soporta lista plana
  # de holidays, no rangos `vacations`) las trate como no lectivas.
  school_start_month: 9
  school_end_month: 6
  holidays:
    # Navidad 2025-26 (2025-12-22 -> 2026-01-07)
    - "2025-12-22"
    - "2025-12-23"
    - "2025-12-24"
    - "2025-12-25"
    - "2025-12-26"
    - "2025-12-27"
    - "2025-12-28"
    - "2025-12-29"
    - "2025-12-30"
    - "2025-12-31"
    - "2026-01-01"
    - "2026-01-02"
    - "2026-01-03"
    - "2026-01-04"
    - "2026-01-05"
    - "2026-01-06"
    - "2026-01-07"
    # Fallas (2026-03-14 -> 2026-03-19)
    - "2026-03-14"
    - "2026-03-15"
    - "2026-03-16"
    - "2026-03-17"
    - "2026-03-18"
    - "2026-03-19"
    # Pascua (2026-04-04 -> 2026-04-12)
    - "2026-04-04"
    - "2026-04-05"
    - "2026-04-06"
    - "2026-04-07"
    - "2026-04-08"
    - "2026-04-09"
    - "2026-04-10"
    - "2026-04-11"
    - "2026-04-12"
    # Junio fin curso (2026-06-20 -> 2026-06-30)
    - "2026-06-20"
    - "2026-06-21"
    - "2026-06-22"
    - "2026-06-23"
    - "2026-06-24"
    - "2026-06-25"
    - "2026-06-26"
    - "2026-06-27"
    - "2026-06-28"
    - "2026-06-29"
    - "2026-06-30"
    # Septiembre inicio curso (2026-09-01 -> 2026-09-07)
    - "2026-09-01"
    - "2026-09-02"
    - "2026-09-03"
    - "2026-09-04"
    - "2026-09-05"
    - "2026-09-06"
    - "2026-09-07"

schedule:
  aula_capacity_mean: 28
  aula_capacity_std: 6
  aula_utilization_mean: 0.75
  aula_utilization_std: 0.10
  day_to_day_variability: 0.12
  slots:
    - start: "08:00"
      end: "15:00"
      p_occupancy: 0.85
    - start: "15:00"
      end: "20:00"
      p_occupancy: 0.30

physics:
  # Llaves alineadas con las que el vendor REALMENTE lee en
  # vendor/.../physics/{indoor,actuators,environment}.py.
  # T-PV-50 (cierra L-PV-03): el override anterior usaba `base_ppm`,
  # `per_person_ppm`, `decay_rate`, `thermal_mass`, etc. — claves que el código
  # NO lee, así que el override era inerte. Aquí migramos a las claves canónicas.
  outdoor_temp:
    mean_annual: 17.0      # zona climática Csa Valencia (AEMET 2024)
    amplitude: 9.5         # swing anual ~19°C peak-to-peak
    daily_noise_std: 1.0
  indoor:
    # Térmica primer orden (RC).
    initial_temp: 20.5
    tau_minutes: 90        # tau de 90 min (EN ISO 13790 aula media, heating)
    # F-5 (PATCH 008): cooling es 30-50 % más rápido que heating en aulas
    # (split/cassette con convección de aire frío vs radiador hidráulico).
    # 60 min es ~33 % más rápido que 90 min — coherente con literatura HVAC.
    tau_cool_minutes: 60
    occupancy_heat_gain_c_per_person: 0.02   # ASHRAE 55 sensible
    setpoint_class: 21.0
    setpoint_out_of_hours: 18.0
    # H-23 (PHYSICAL_REALISM_REPORT.md): default vendor 0.3 dispara 75 cambios/h por aula
    # en state_events. 0.05 °C basta para microruido de termostato y reduce el flujo
    # on-change a un orden de magnitud realista (~5 ev/h por aula).
    setpoint_jitter_std: 0.05
    setpoint_manual_jitter_std: 0.8
    # L-PV-07 (PATCH 004): anti short-cycle HVAC. Min on/off time tras cada transición.
    # Compresores reales se dañan con cycles < 3 min; 5 min es práctica estándar HVAC.
    hvac_min_on_minutes: 5.0
    hvac_min_off_minutes: 5.0
    # F-7 (PATCH 007): rate limiter actuador válvula. Real ~2-5 %/s = 120-300 %/min.
    # Usamos 60 %/min como compromiso (1 %/s, válvulas térmicas lentas tipo TRV).
    valve_max_rate_per_min: 60.0
  co2:
    # Well-mixed CO2 dynamics.
    outdoor_ppm: 420                          # baseline outdoor
    # F-8 (PHYSICAL_REALISM_REPORT): vendor default era 7.5 ppm/p/min, 1.7×
    # superior al estándar literatura. Alineamos con ASHRAE 62.1 / EN 16798:
    # adultos sedentarios ≈ 4.5 ppm/p/min (rango 3-7). Override visible para
    # post-L-01 (calibración real con datos IES Simarro).
    gen_ppm_per_min_per_person: 4.5
    vent_k_per_min: 0.06                      # tau ventilación con HVAC ON ≈ 14 min
    leak_k_per_min: 0.01                      # tau leak natural ≈ 100 min
  humidity:
    outdoor_mean: 55.0                        # %RH baseline outdoor (Valencia Csa)
    occupancy_gain_per_person: 0.08           # %RH/persona (vapor exhalado)
    # L-PV-09 (PATCH 003): cooling deshumidifica. tau y cooling_dehum_delta antes hardcoded.
    tau_minutes: 180                          # tau de respuesta (~3h, legacy hardcoded)
    cooling_dehum_delta: 8.0                  # %RH menos en target cuando HVAC en cool
  noise:
    base_unoccupied: 33.0                     # dB(A) ambiente
    base_occupied: 55.0                       # dB(A) base con ocupación
    std: 4.0                                  # dB(A) ruido aleatorio
  light:
    target_lux_on: 550                        # lux setpoint con luz artificial
    # F-9 (PHYSICAL_REALISM_REPORT): vendor default era 70, irreal con
    # persianas cerradas o noche. ~5 lux es ambient residual con monitor PC,
    # luz indirecta o luz de pasillo filtrándose.
    target_lux_off: 5
    std: 40                                   # lux ruido medición
