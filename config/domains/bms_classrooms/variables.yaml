# =============================================================================
# BMS Classrooms — Catálogo de variables (poblado en captia_metadata)
# metric_kind dirige el downsampling (analog_gauge / counter / bool_state /
# bool_presence / setpoint_step). Ver docs/specs/synthetic-bms/02-domain-spec.md.
# =============================================================================

variables:
  # ENVIRONMENTAL
  - name: temperature_01
    unit: "°C"
    metric_kind: analog_gauge
    rango_min: 16
    rango_max: 32
  - name: relative_humidity_01
    unit: "%RH"
    metric_kind: analog_gauge
    rango_min: 20
    rango_max: 80
  - name: co2
    unit: "ppm"
    metric_kind: analog_gauge
    rango_min: 300
    rango_max: 5000
  - name: t_voc
    unit: "ppb"
    metric_kind: analog_gauge
    rango_min: 0
    rango_max: 3000
  - name: iaq_index
    unit: "index"
    metric_kind: analog_gauge
    rango_min: 0
    rango_max: 500
  - name: avg_sound_level
    unit: "dB"
    metric_kind: analog_gauge
    rango_min: 30
    rango_max: 90
  - name: max_sound_level
    unit: "dB"
    metric_kind: analog_gauge
    rango_min: 30
    rango_max: 110
  - name: luminosity
    unit: "lux"
    metric_kind: analog_gauge
    rango_min: 0
    rango_max: 2000

  # ENERGY
  - name: power_01
    unit: "W"
    metric_kind: counter
    rango_min: 0
    rango_max: 3000

  # HVAC
  - name: temperature_supply
    unit: "°C"
    metric_kind: analog_gauge
    rango_min: 8
    rango_max: 30
  - name: temperature_return
    unit: "°C"
    metric_kind: analog_gauge
    rango_min: 8
    rango_max: 32
  - name: ac_state
    unit: "bool"
    metric_kind: bool_state
    rango_min: 0
    rango_max: 1
  - name: ac_control
    unit: "bool"
    metric_kind: bool_state
    rango_min: 0
    rango_max: 1
  - name: fan_speed_01_state
    unit: "bool"
    metric_kind: bool_state
    rango_min: 0
    rango_max: 1
  - name: fan_speed_02_state
    unit: "bool"
    metric_kind: bool_state
    rango_min: 0
    rango_max: 1
  - name: fan_speed_03_state
    unit: "bool"
    metric_kind: bool_state
    rango_min: 0
    rango_max: 1
  - name: light_01_state
    unit: "bool"
    metric_kind: bool_state
    rango_min: 0
    rango_max: 1
  - name: light_02_state
    unit: "bool"
    metric_kind: bool_state
    rango_min: 0
    rango_max: 1
  - name: valve_control
    unit: "bool"
    metric_kind: bool_state
    rango_min: 0
    rango_max: 1
  - name: valve_state
    unit: "bool"
    metric_kind: bool_state
    rango_min: 0
    rango_max: 1

  # OCCUPANCY
  - name: occupancy
    unit: "bool"
    metric_kind: bool_presence
    rango_min: 0
    rango_max: 1
  - name: people_count
    unit: "count"
    metric_kind: analog_gauge
    rango_min: 0
    rango_max: 50

  # EXTERNAL (compartidas, asset_id genérico "OUTDOOR" o por sitio)
  - name: temperature_outdoor
    unit: "°C"
    metric_kind: analog_gauge
    rango_min: -5
    rango_max: 45
  - name: solar_irradiance
    unit: "W/m²"
    metric_kind: analog_gauge
    rango_min: 0
    rango_max: 1100
