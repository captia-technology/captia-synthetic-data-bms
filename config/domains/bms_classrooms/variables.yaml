# =============================================================================
# BMS Classrooms — Variable Catalog (override LOCAL alineado con producción)
# =============================================================================
# Override de vendor/synthetic-generator/config/domains/bms_classrooms/variables.yaml
# resuelto por inventory.py:117-124 (walking up file system).
#
# Mantiene `name:` con nombres VENDOR (lo que el physics produce: temperature,
# humidity, ...) y añade `production_name:` con el nombre canónico de
# simarro-prod (docs/influxdb-simarro-buckets.pptx slide 14, Sep 2026).
#
# Usado por:
#   - vendor BMSDomainPlugin → inventory (lee `name`, ignora `production_name`).
#   - extensions/bms_signal_alias/AliasSinkAdapter → renombra DataPoints
#     `name` → `production_name` antes de emit a MQTT/file (T-PV-21).
#   - infra/influxdb/init/init_buckets_tasks.sh::populate_metadata → escribe
#     entries en captia_point_meta (bucket captia_metadata) usando
#     production_name si existe, sino name (T-PV-23).
#
# Source of truth para mapping:
#   docs/specs/digital-twin-bms-physics-validation/11-production-signal-mapping.md
#
# metric_kind values (drives downsampling y storage_mode):
#   analog_gauge    → continuous, mean/min/max
#   bool_presence   → continuous, duty/count_rise/last
#   bool_state      → on_change, last/count_rise
#   setpoint_step   → on_change, last
#   counter         → continuous, sum (delta vía nonNegative)
#   skip            → continuous, no rollup

asset_types:
  classroom:
    variables:
      # ── Sensors: Environmental ──────────────────────────────────
      - name: temperature
        production_name: temperature_01
        data_type: float
        unit: "°C"
        point_type: sensor
        metric_kind: analog_gauge
        category: ENVIRONMENTAL
        range: [10.0, 35.0]

      - name: humidity
        production_name: relative-humidity
        data_type: float
        unit: "%RH"
        point_type: sensor
        metric_kind: analog_gauge
        category: ENVIRONMENTAL
        range: [10.0, 90.0]

      - name: co2
        production_name: co2
        data_type: float
        unit: ppm
        point_type: sensor
        metric_kind: analog_gauge
        category: ENVIRONMENTAL
        range: [400.0, 2200.0]

      - name: iaq_index
        production_name: iaq-index
        data_type: float
        unit: index
        point_type: calculated
        metric_kind: analog_gauge
        category: ENVIRONMENTAL
        range: [0.0, 500.0]

      - name: noise
        production_name: avg-sound-level
        data_type: float
        unit: "dB(A)"
        point_type: sensor
        metric_kind: analog_gauge
        category: ENVIRONMENTAL
        range: [25.0, 90.0]

      - name: illuminance
        production_name: luminosity
        data_type: float
        unit: lux
        point_type: sensor
        metric_kind: analog_gauge
        category: ENVIRONMENTAL
        range: [0.0, 2500.0]

      # ── Sensors: Occupancy ──────────────────────────────────────
      - name: occupancy
        production_name: people-count
        data_type: integer
        unit: persons
        point_type: sensor
        metric_kind: analog_gauge
        category: OCCUPANCY
        range: [0.0, 100.0]

      - name: presence_pir
        production_name: occupancy
        data_type: boolean
        unit: bool
        point_type: sensor
        metric_kind: bool_presence
        category: OCCUPANCY

      # ── Sensors: External ───────────────────────────────────────
      - name: outdoor_temp
        production_name: temperature-outdoor
        data_type: float
        unit: "°C"
        point_type: sensor
        metric_kind: analog_gauge
        category: EXTERNAL
        range: [-10.0, 45.0]

      - name: daylight_lux
        production_name: daylight-lux
        data_type: float
        unit: lux
        point_type: sensor
        metric_kind: analog_gauge
        category: EXTERNAL
        range: [0.0, 1000.0]

      # ── Actuators: HVAC (on_change via metric_kind) ─────────────
      - name: thermostat_setpoint
        production_name: temperature_01_sp
        data_type: float
        unit: "°C"
        point_type: setpoint
        metric_kind: setpoint_step
        storage_mode: on_change
        category: HVAC
        range: [14.0, 30.0]

      - name: hvac_mode
        production_name: ac_control
        data_type: enum
        unit: enum
        point_type: actuator
        metric_kind: setpoint_step
        storage_mode: on_change
        category: HVAC
        enum_values: [off, heat, cool, auto]

      - name: hvac_enable
        production_name: ac_state
        data_type: boolean
        unit: bool
        point_type: actuator
        metric_kind: bool_state
        storage_mode: on_change
        category: HVAC

      - name: heating_valve_pos
        production_name: valve_control
        data_type: float
        unit: "%"
        point_type: actuator
        metric_kind: analog_gauge
        category: HVAC
        range: [0.0, 100.0]

      # ── Actuators: Control (on_change relays) ───────────────────
      - name: scene_mode
        production_name: scene_mode
        data_type: enum
        unit: enum
        point_type: actuator
        metric_kind: setpoint_step
        storage_mode: on_change
        category: CONTROL
        enum_values: [out_of_hours, class, manual]

      - name: relay_1
        production_name: light_01_state
        data_type: boolean
        unit: bool
        point_type: actuator
        metric_kind: bool_state
        storage_mode: on_change
        category: CONTROL

      - name: relay_2
        production_name: light_02_state
        data_type: boolean
        unit: bool
        point_type: actuator
        metric_kind: bool_state
        storage_mode: on_change
        category: CONTROL

      - name: relay_3
        production_name: fan_speed_01_state
        data_type: boolean
        unit: bool
        point_type: actuator
        metric_kind: bool_state
        storage_mode: on_change
        category: CONTROL

      - name: relay_4
        production_name: fan_speed_02_state
        data_type: boolean
        unit: bool
        point_type: actuator
        metric_kind: bool_state
        storage_mode: on_change
        category: CONTROL

      # ── Sensors: Energy ─────────────────────────────────────────
      - name: power
        production_name: power_01
        data_type: float
        unit: W
        point_type: sensor
        metric_kind: analog_gauge
        category: ENERGY
        range: [0.0, 6000.0]

      - name: energy
        production_name: energy_01
        data_type: float
        unit: kWh
        point_type: sensor
        metric_kind: counter
        counter_wire: cumulative_monotonic
        category: ENERGY
