# =============================================================================
# BMS v1 — Caso D (Calidad aire / ocupación, 3 meses)
# Backfill 90 días @ 1min para training del modelo de ocupancia desde CO2.
# CO2 es el predictor principal; incluye T, RH, sound, lux, occupancy.
# =============================================================================

project:
  namespace: "captia"
  site_id: "ies_simarro"
  modo: "synthetic"
  schema_version: "v0.1"

simulation:
  timezone: "Europe/Madrid"
  seed: 42
  start: "2026-03-01T00:00:00"
  end: "2026-05-31T23:59:59"
  freq: "1min"
  n_aulas: 10

domain:
  id: "bms_classrooms"
  config_path: "/app/config/domains/bms_classrooms/domain.yaml"

phases:
  backfill:
    enabled: true
  live:
    enabled: false

perturbations:
  jitter_ms: 0.0
  duplicate_probability: 0.0
  out_of_order_probability: 0.0

anomalies:
  p_missing: 0.0005
  p_outlier: 0.0002

sinks:
  - type: file
    config:
      path: "/app/output/bms_caseD_iaq_3m.lp"
      format: "csv_long"

output:
  format: "long"
  include_quality: true
  include_mqtt: false
