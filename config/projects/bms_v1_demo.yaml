# =============================================================================
# BMS v1 — Demo en vivo (Caso A)
# Pipeline IoT MQTT → Telegraf → InfluxDB → Grafana en tiempo real.
# Volumen contenido (10 aulas × 5s) para demos y desarrollo.
# =============================================================================

project:
  namespace: "captia"
  site_id: "ies_simarro"
  modo: "synthetic"
  schema_version: "v0.1"

simulation:
  timezone: "Europe/Madrid"
  seed: 42
  start: "2025-09-08T00:00:00"
  end: "2025-10-08T00:00:00"
  freq: "5s"
  n_aulas: 10

domain:
  id: "bms_classrooms"
  config_path: "/app/config/domains/bms_classrooms/domain.yaml"

phases:
  backfill:
    enabled: false
  live:
    enabled: true
    rate_points_per_sec: 50.0
    lookahead_hours: 1
    regenerate_on_exhaustion: true

perturbations:
  jitter_ms: 30.0
  duplicate_probability: 0.0
  out_of_order_probability: 0.001
  gap_probability: 0.0
  gap_duration_points: [1, 3]

anomalies:
  p_missing: 0.001
  p_outlier: 0.0005
  burst_missing_prob_per_day: 0.0
  burst_duration_range: [2, 10]

sinks:
  - type: mqtt
    config:
      broker_url: "tcp://mosquitto:1883"
      captia_env: "dev"
      captia_tenant: "default"
      captia_site: "ies_simarro"
      client_id: "captia-bms-generator-demo"
      qos: 1
      payload_format: "json"

output:
  format: "long"
  include_quality: true
  include_mqtt: true
