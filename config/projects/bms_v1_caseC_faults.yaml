# =============================================================================
# BMS v1 — Caso C (Detección anomalías HVAC, 6 meses)
# Backfill 180 días @ 5min con fault injection enabled.
# Genera etiquetas de fallo en bucket state_events para training supervisado.
# =============================================================================

project:
  namespace: "captia"
  site_id: "ies_simarro"
  modo: "synthetic"
  schema_version: "v0.1"

simulation:
  timezone: "Europe/Madrid"
  seed: 42
  start: "2026-01-01T00:00:00"
  end: "2026-06-30T23:59:59"
  freq: "5min"
  n_aulas: 10

domain:
  id: "bms_classrooms"
  config_path: "/app/config/domains/bms_classrooms/domain.yaml"

phases:
  backfill:
    enabled: true
  live:
    enabled: false

perturbations:
  jitter_ms: 0.0
  duplicate_probability: 0.0
  out_of_order_probability: 0.0

anomalies:
  p_missing: 0.001
  p_outlier: 0.001

faults:
  enabled: true
  config_path: "/app/config/domains/bms_classrooms/faults.yaml"

sinks:
  - type: file
    config:
      path: "/app/output/bms_caseC_faults_6m.lp"
      format: "csv_long"

output:
  format: "long"
  include_quality: true
  include_mqtt: false
