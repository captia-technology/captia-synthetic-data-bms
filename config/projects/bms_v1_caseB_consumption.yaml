# =============================================================================
# BMS v1 — Caso B (Predicción consumo eléctrico 24h, 12 meses)
# Backfill 365 días @ 5min para training de modelos SARIMA / XGBoost / LSTM.
# Variables clave: power_01, temperature_outdoor, solar_irradiance, occupancy.
# =============================================================================

project:
  namespace: "captia"
  site_id: "ies_simarro"
  modo: "synthetic"
  schema_version: "v0.1"

simulation:
  timezone: "Europe/Madrid"
  seed: 42
  start: "2025-09-01T00:00:00"
  end: "2026-08-31T23:59:59"
  freq: "5min"
  n_aulas: 10

domain:
  id: "bms_classrooms"
  config_path: "/app/config/domains/bms_classrooms/domain.yaml"

phases:
  backfill:
    enabled: true
  live:
    enabled: false

perturbations:
  jitter_ms: 0.0
  duplicate_probability: 0.0
  out_of_order_probability: 0.0

anomalies:
  p_missing: 0.001
  p_outlier: 0.0005

sinks:
  - type: file
    config:
      path: "/app/output/bms_caseB_consumption_12m.lp"
      format: "csv_long"

output:
  format: "long"
  include_quality: true
  include_mqtt: false
