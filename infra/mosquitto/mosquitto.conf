# =============================================================================
# Mosquitto MQTT Broker Configuration
# =============================================================================

# Listener
listener 1883
protocol mqtt

# WebSocket listener (optional, for debugging UIs)
listener 9001
protocol websockets

# Security
# DEV MODE: anonymous connections enabled. DO NOT USE IN PRODUCTION.
# For production, configure password_file + acl_file and set allow_anonymous false.
allow_anonymous true

# Persistence — keeps QoS1 messages for persistent sessions
persistence true
persistence_location /mosquitto/data/
autosave_interval 30

# Connection and queue limits (F1.1 — dev profile, generous)
# Scenario C benchmark revealed 10k was too tight: during a 400 msg/s × 60s burst
# plus ~160 msg/s baseline, Telegraf (the main per-client queue) exceeded the
# limit in ~20s. Raised to 50k for dev; prod coherent with its own mem_limit.
# Bytes cap (100 MB) still protects against OOM regardless of message count.
# Empirical benchmark finding (scenarios D/E/H): the real bottleneck at the
# subscriber side (Telegraf QoS1 consumer) drains at ~100-200 msg/s, below the
# 500+ msg/s peak expected during bursts. Queue headroom must account for
# sustained backlog accumulation. 200k gives ~16 min of 200 msg/s cushion.
# Bytes cap still limits OOM exposure.
max_connections 5000
# F1.1 — Subido de 200 → 1000 tras incidente "Outgoing messages dropped"
# (2026-05-10): cuando 2+ procesos comparten client_id (ej. zombies del host
# + container generator), el ciclo de reconnect satura el queue de outgoing
# del subscriber Telegraf. Con 1000 inflight, sobrevivimos a bursts de
# reconexiones mientras el RunnerService.stop() libera los threads.
max_inflight_messages 1000
max_queued_messages 200000
max_queued_bytes 104857600
# max_packet_size replaces deprecated message_size_limit in Mosquitto 2.0.18+
max_packet_size 1048576

# Clean up zombie persistent sessions after 2h of disconnection (F1.3)
persistent_client_expiration 2h

# $SYS/# broker stats publish interval (required by mosquitto-exporter)
sys_interval 10

# Logging
log_dest stdout
log_type error
log_type warning
log_type notice
log_type information
connection_messages true
