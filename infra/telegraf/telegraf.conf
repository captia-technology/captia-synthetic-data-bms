# =============================================================================
# Telegraf Configuration - MQTT to InfluxDB (BMS-only stack)
# =============================================================================
# Adaptado del template Telegraf de captia-connect upstream (interno).
# Ajustes para CAPTIA-SYNTHETIC-DATA-BMS:
#   - Eliminado outputs.heartbeat (no controller en este stack).
#   - Eliminado outputs.file rotativo (delegado a generator dump_service).
#   - Mantenido schema canónico CAPTIA: captia_point + 5 tags + field value.
#   - Mantenido clone+dedup para state_events.
#
# FIX (2026-05-10): eliminado `persistent_session = true` y `statefile` tras
# diagnosticar que el queue persistente del broker acumulaba mensajes con
# timestamps corruptos (residuo histórico). Cada restart de Telegraf
# entregaba ese backlog y los puntos quedaban "outside retention policy",
# se descartaban silenciosamente (HTTP 204 sin error en logs). Con
# `persistent_session=false` cada restart parte de cero.
# =============================================================================

[agent]
  interval = "5s"
  round_interval = true
  flush_interval = "10s"
  flush_jitter = "2s"

  metric_batch_size = 5000
  metric_buffer_limit = 100000

  collection_jitter = "0s"
  precision = "0s"
  hostname = ""
  # Schema canonical CAPTIA (PPTX simarro slide 5, commit c1997bb 2026-04-13):
  # `host` tag eliminado por ser efímero por restart (rompe cardinality estable).
  omit_hostname = true
  quiet = false

# =============================================================================
# Input: MQTT Consumer — captia namespace (JSON)
# Topic: captia/{env}/{tenant}/{site}/{device}/telemetry/{name}
# Payload: {"value": X, "ts_ns": N}
# =============================================================================
[[inputs.mqtt_consumer]]
  servers = ["tcp://${MQTT_HOST}:${MQTT_PORT}"]
  topics = [
    "captia/+/+/+/+/telemetry/+"
  ]
  qos = 1
  connection_timeout = "30s"
  max_undelivered_messages = 10000
  # FIX (2026-05-10): persistent_session=false. Ver cabecera del archivo.
  persistent_session = false
  client_id = "captia-bms-telegraf-ingest"
  data_format = "json"
  name_override = "captia_point"
  topic_tag = "topic"

  json_time_key = "ts_ns"
  json_time_format = "unix_ns"

# =============================================================================
# Input: MQTT Consumer — captia event streams (T-PV-18, cierra L-PV-18)
# Topic: captia/{env}/{tenant}/{site}/{device}/event/{name}, captia/sniper/event
# Payload: { ts, type, cmd_id, reason, error, source, detail, ... }
# Goes to bucket telemetry_events with measurement captia_cmd_event.
# Source: docs/archive/presentaciones/captia-connect-partner-integration.pptx slide 5,
#         docs/archive/presentaciones/influxdb-simarro-buckets.pptx slide 8.
# =============================================================================
[[inputs.mqtt_consumer]]
  servers = ["tcp://${MQTT_HOST}:${MQTT_PORT}"]
  topics = [
    "captia/+/+/+/+/event/+",
    "captia/sniper/event",
  ]
  qos = 1
  connection_timeout = "30s"
  max_undelivered_messages = 10000
  # FIX (2026-05-10): persistent_session=false. Ver cabecera del archivo.
  persistent_session = false
  client_id = "captia-bms-telegraf-events"
  data_format = "json"
  name_override = "captia_cmd_event"
  topic_tag = "topic"

  json_time_key = "ts_ns"
  json_time_format = "unix_ns"

  ## Tag fields parsed as strings to preserve event_type, cmd_id, reason, etc.
  json_string_fields = ["type", "event_type", "cmd_id", "metric", "target", "reason", "error", "source", "detail"]

# =============================================================================
# Input: Internal — self-monitoring
# =============================================================================
[[inputs.internal]]
  collect_memstats = true

# -----------------------------------------------------------------------------
# Processor: extract 5 tags from canonical telemetry topic.
# Format: captia/{env}/{tenant}/{site}/{device}/telemetry/{name}
# order=1 garantiza que regex extrae los 5 tags ANTES de tag_limit (order=2)
# que quita el tag `topic`.
# -----------------------------------------------------------------------------
[[processors.regex]]
  order = 1
  namepass = ["captia_point"]

  [[processors.regex.tags]]
    key = "topic"
    pattern = "^captia/(?P<captia_env>[^/]+)/(?P<tenant>[^/]+)/(?P<site_id>[^/]+)/(?P<asset_id>[^/]+)/(?P<stream>[^/]+)/(?P<variable>[^/]+)$"
    replacement = "${captia_env}"
    result_key = "captia_env"

  [[processors.regex.tags]]
    key = "topic"
    pattern = "^captia/(?P<captia_env>[^/]+)/(?P<tenant>[^/]+)/(?P<site_id>[^/]+)/(?P<asset_id>[^/]+)/(?P<stream>[^/]+)/(?P<variable>[^/]+)$"
    replacement = "${tenant}"
    result_key = "domain_id"

  [[processors.regex.tags]]
    key = "topic"
    pattern = "^captia/(?P<captia_env>[^/]+)/(?P<tenant>[^/]+)/(?P<site_id>[^/]+)/(?P<asset_id>[^/]+)/(?P<stream>[^/]+)/(?P<variable>[^/]+)$"
    replacement = "${site_id}"
    result_key = "site_id"

  [[processors.regex.tags]]
    key = "topic"
    pattern = "^captia/(?P<captia_env>[^/]+)/(?P<tenant>[^/]+)/(?P<site_id>[^/]+)/(?P<asset_id>[^/]+)/(?P<stream>[^/]+)/(?P<variable>[^/]+)$"
    replacement = "${asset_id}"
    result_key = "asset_id"

  [[processors.regex.tags]]
    key = "topic"
    pattern = "^captia/(?P<captia_env>[^/]+)/(?P<tenant>[^/]+)/(?P<site_id>[^/]+)/(?P<asset_id>[^/]+)/(?P<stream>[^/]+)/(?P<variable>[^/]+)$"
    replacement = "${variable}"
    result_key = "variable"

# -----------------------------------------------------------------------------
# Schema canonical CAPTIA: eliminar tag `topic` después de extraer los 5 tags
# (PPTX simarro slide 5: "Eliminados commit c1997bb: topic ×13 cardinalidad").
# El tag `topic` infló cardinality 13× hasta producción aplicó la limpieza.
# -----------------------------------------------------------------------------
[[processors.tag_limit]]
  order = 2
  namepass = ["captia_point", "captia_cmd_event"]
  limit = 5
  keep = ["captia_env", "domain_id", "site_id", "asset_id", "variable"]

# =============================================================================
# Processor: clone — duplicar señales on-change a captia_point_state
# para dedup posterior. tagpass restringe por convención de naming.
# =============================================================================
[[processors.clone]]
  order = 3
  namepass = ["captia_point"]
  name_override = "captia_point_state"
  # Cierra Gap CENTINELA+ § 282-290: las señales on_change que aterrizan en
  # state_events deben llevar el tag `stat=last` (y, donde aplique, el
  # rollup posterior añade `stat=count_rise`). Adjuntar el tag aquí — en
  # el clon, antes del dedup — garantiza que cada punto del bucket tiene
  # `stat` poblado sin tocar el flujo `captia_point` raw.
  [processors.clone.tags]
    stat = "last"
  [processors.clone.tagpass]
    variable = [
      # Convención canónica suffix glob (PPTX partner integration slide 7).
      "*_cmd",
      "*_ack",
      "*_status",
      "*_state",
      "*_st",
      "*_active",
      "*_enable",
      "*_in_progress",
      "relay_*",
      "*_setpoint",
      "*_sp",
      "*_mode",
      # Faults emitidos por extensions/bms_calibration FaultEventEmitter (T-PV-08).
      "fault.*",
      # T-PV-28 (cierra L-PV-22): variables on_change que NO matchean suffix glob
      # pero son on_change por metric_kind (setpoint_step / bool_state).
      # Producción real (PPTX simarro slide 14) las usa así:
      "ac_control",
      "aire_state",
      # AUDIT 2026-05-10: valve_control es setpoint_step on_change pero el
      # nombre no matchea ningún glob (no es *_sp, *_setpoint ni *_cmd).
      # Añadido explícito para que aterrice en state_events.
      "valve_control",
    ]

[[processors.dedup]]
  order = 4
  dedup_interval = "168h"
  namepass = ["captia_point_state"]

# =============================================================================
# Output: InfluxDB v2 — telemetry bucket (raw captia_point, sin dedup).
# =============================================================================
[[outputs.influxdb_v2]]
  urls = ["${INFLUXDB_URL}"]
  token = "${INFLUXDB_TOKEN}"
  organization = "${INFLUXDB_ORG}"
  bucket = "${INFLUXDB_BUCKET:-telemetry}"

  timeout = "10s"
  content_encoding = "gzip"
  namepass = ["captia_point"]

# =============================================================================
[[outputs.influxdb_v2]]
  urls = ["${INFLUXDB_URL}"]
  token = "${INFLUXDB_TOKEN}"
  organization = "${INFLUXDB_ORG}"
  bucket = "${INFLUXDB_BUCKET_STATE_EVENTS:-state_events}"

  timeout = "10s"
  content_encoding = "gzip"
  namepass = ["captia_point_state"]

# =============================================================================
[[outputs.influxdb_v2]]
  urls = ["${INFLUXDB_URL}"]
  token = "${INFLUXDB_TOKEN}"
  organization = "${INFLUXDB_ORG}"
  bucket = "${INFLUXDB_BUCKET_EVENTS:-telemetry_events}"

  timeout = "10s"
  content_encoding = "gzip"
  namepass = ["captia_cmd_event"]

# =============================================================================
[[outputs.prometheus_client]]
  listen = ":9273"
  metric_version = 2
