[agent]
  interval = "5s"
  flush_interval = "10s"
  metric_batch_size = 1000
  metric_buffer_limit = 10000
  omit_hostname = true
  quiet = false

[[inputs.mqtt_consumer]]
  servers = ["tcp://${MQTT_HOST}:${MQTT_PORT}"]
  topics = ["captia/+/+/+/+/telemetry/+"]
  qos = 1
  client_id = "captia-bms-tg-step2"
  data_format = "json"
  name_override = "captia_point"
  topic_tag = "topic"
  json_time_key = "ts_ns"
  json_time_format = "unix_ns"

[[inputs.mqtt_consumer]]
  servers = ["tcp://${MQTT_HOST}:${MQTT_PORT}"]
  topics = ["captia/+/+/+/+/event/+", "captia/sniper/event"]
  qos = 1
  client_id = "captia-bms-tg-step2-events"
  data_format = "json"
  name_override = "captia_cmd_event"
  topic_tag = "topic"
  json_time_key = "ts_ns"
  json_time_format = "unix_ns"
  json_string_fields = ["type", "event_type", "cmd_id", "metric", "target", "reason", "error", "source", "detail"]

[[processors.regex]]
  namepass = ["captia_point"]
  [[processors.regex.tags]]
    key = "topic"
    pattern = "^captia/(?P<env>[^/]+)/(?P<dom>[^/]+)/(?P<site>[^/]+)/(?P<asset>[^/]+)/(?P<stream>[^/]+)/(?P<var>[^/]+)$"
    replacement = "${env}"
    result_key = "captia_env"
  [[processors.regex.tags]]
    key = "topic"
    pattern = "^captia/(?P<env>[^/]+)/(?P<dom>[^/]+)/(?P<site>[^/]+)/(?P<asset>[^/]+)/(?P<stream>[^/]+)/(?P<var>[^/]+)$"
    replacement = "${dom}"
    result_key = "domain_id"
  [[processors.regex.tags]]
    key = "topic"
    pattern = "^captia/(?P<env>[^/]+)/(?P<dom>[^/]+)/(?P<site>[^/]+)/(?P<asset>[^/]+)/(?P<stream>[^/]+)/(?P<var>[^/]+)$"
    replacement = "${site}"
    result_key = "site_id"
  [[processors.regex.tags]]
    key = "topic"
    pattern = "^captia/(?P<env>[^/]+)/(?P<dom>[^/]+)/(?P<site>[^/]+)/(?P<asset>[^/]+)/(?P<stream>[^/]+)/(?P<var>[^/]+)$"
    replacement = "${asset}"
    result_key = "asset_id"
  [[processors.regex.tags]]
    key = "topic"
    pattern = "^captia/(?P<env>[^/]+)/(?P<dom>[^/]+)/(?P<site>[^/]+)/(?P<asset>[^/]+)/(?P<stream>[^/]+)/(?P<var>[^/]+)$"
    replacement = "${var}"
    result_key = "variable"

[[processors.tag_limit]]
  namepass = ["captia_point", "captia_cmd_event"]
  limit = 5
  keep = ["captia_env", "domain_id", "site_id", "asset_id", "variable"]

[[processors.clone]]
  namepass = ["captia_point"]
  name_override = "captia_point_state"
  [processors.clone.tags]
    stat = "last"
  [processors.clone.tagpass]
    variable = ["*_cmd","*_ack","*_status","*_state","*_st","*_active","*_enable","*_in_progress","relay_*","*_setpoint","*_sp","*_mode","fault.*","ac_control","aire_state"]

[[processors.dedup]]
  dedup_interval = "168h"
  namepass = ["captia_point_state"]

[[outputs.influxdb_v2]]
  urls = ["${INFLUXDB_URL}"]
  token = "${INFLUXDB_TOKEN}"
  organization = "${INFLUXDB_ORG}"
  bucket = "${INFLUXDB_BUCKET:-telemetry}"
  timeout = "10s"
  namepass = ["captia_point"]

[[outputs.influxdb_v2]]
  urls = ["${INFLUXDB_URL}"]
  token = "${INFLUXDB_TOKEN}"
  organization = "${INFLUXDB_ORG}"
  bucket = "${INFLUXDB_BUCKET_STATE_EVENTS:-state_events}"
  timeout = "10s"
  namepass = ["captia_point_state"]

[[outputs.influxdb_v2]]
  urls = ["${INFLUXDB_URL}"]
  token = "${INFLUXDB_TOKEN}"
  organization = "${INFLUXDB_ORG}"
  bucket = "${INFLUXDB_BUCKET_EVENTS:-telemetry_events}"
  timeout = "10s"
  namepass = ["captia_cmd_event"]

[[outputs.prometheus_client]]
  listen = ":9273"
  metric_version = 2
