name: CI

on:
  push:
    branches: [main, master]
  pull_request:
    branches: [main, master]
  workflow_dispatch:

permissions:
  contents: read

concurrency:
  group: ci-${{ github.ref }}
  cancel-in-progress: true

jobs:
  lint:
    name: Lint (ruff)
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Install uv
        uses: astral-sh/setup-uv@v4
        with:
          version: "0.5.18"
          enable-cache: true

      - name: Set up Python 3.12
        run: uv python install 3.12

      - name: Sync workspace
        run: uv sync --frozen

      - name: ruff check
        run: uv run ruff check .

      - name: ruff format check
        run: uv run ruff format --check .

  test:
    name: Tests (Python ${{ matrix.python }})
    runs-on: ubuntu-latest
    strategy:
      fail-fast: false
      matrix:
        python: ["3.12"]
    steps:
      - uses: actions/checkout@v4

      - name: Install uv
        uses: astral-sh/setup-uv@v4
        with:
          version: "0.5.18"
          enable-cache: true

      - name: Set up Python ${{ matrix.python }}
        run: uv python install ${{ matrix.python }}

      - name: Sync workspace
        run: uv sync --frozen

      - name: Unit tests (workspace)
        run: uv run pytest -m unit -q --no-header

      - name: Integration tests (in-process)
        run: uv run pytest -m integration -q --no-header

      - name: Snapshot determinism
        run: uv run pytest -m snapshot -q --no-header

      - name: Vendor unit tests
        run: |
          uv run pytest vendor/synthetic-generator/tests/unit \
            -q --no-header --override-ini="markers=" -p no:cacheprovider

      # H-05 (AUDIT_REPORT): coverage gating del workspace BMS-specific.
      # Umbral configurado en pyproject.toml [tool.coverage.report] fail_under=80.
      - name: Coverage gating (>=80%)
        run: |
          uv run pytest \
            modules/bms-data-generator/tests \
            extensions/bms_calibration/tests \
            tests/integration \
            --cov \
            --cov-report=term \
            --cov-report=xml \
            --no-header

      - name: Upload coverage report (artifact)
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: coverage-${{ matrix.python }}
          path: |
            coverage.xml
            .coverage
          retention-days: 14
          if-no-files-found: ignore

  docker-build:
    name: Build Docker image (bms-data-generator)
    runs-on: ubuntu-latest
    needs: [lint, test]
    steps:
      - uses: actions/checkout@v4

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Build (no push)
        uses: docker/build-push-action@v6
        with:
          context: .
          file: modules/bms-data-generator/Dockerfile
          push: false
          tags: captia-bms-data-generator:ci-${{ github.sha }}
          cache-from: type=gha
          cache-to: type=gha,mode=max

  compose-validate:
    name: Validate docker compose files
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Render compose config
        env:
          INFLUXDB_TOKEN: dummy-ci-token-not-a-secret-value-for-validation
          INFLUXDB_ADMIN_PASSWORD: dummy-ci-password-not-a-secret-value
          BMS_API_TOKEN: dummy-ci-bms-api-token-for-validation
        run: |
          docker compose \
            -f compose/base.yaml \
            -f compose/observability.yaml \
            -f compose/generator.yaml \
            -f compose/data-plane-init.yaml \
            config > /dev/null

  e2e-stack:
    # H-06 (AUDIT_REPORT.md): CI levanta el stack y valida smoke. Cubre
    # mosquitto + telegraf + influxdb + redis + grafana + prom + loki +
    # promtail + influx-init (one-shot). Genera .env con secretos random
    # vía scripts/init_env.sh, espera healthy, ejecuta smoke checks,
    # tear down al final con `always()` para liberar runners.
    #
    # No levanta el bms-data-generator (modo demo: el build de la imagen
    # depende de python:3.12-slim que en GitHub Actions runners ocasionales
    # tiene rate-limits — `make demo` skippea el build).
    name: E2E stack smoke (infra-only)
    runs-on: ubuntu-latest
    needs: [lint, test, compose-validate]
    timeout-minutes: 15
    steps:
      - uses: actions/checkout@v4

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Install uv
        uses: astral-sh/setup-uv@v4
        with:
          version: "0.5.18"
          enable-cache: true

      - name: Set up Python 3.12
        run: uv python install 3.12

      - name: Bootstrap .env with random secrets
        run: bash scripts/init_env.sh

      - name: make demo (init + up-infra + wait + smoke)
        run: make demo

      - name: Capture container logs on failure
        if: failure()
        run: |
          mkdir -p /tmp/ci-logs
          for c in mosquitto telegraf influxdb redis grafana prometheus loki promtail influx-init; do
            docker logs "captia-bms-${c}" > "/tmp/ci-logs/${c}.log" 2>&1 || true
          done

      - name: Upload logs artifact
        if: failure()
        uses: actions/upload-artifact@v4
        with:
          name: e2e-stack-logs
          path: /tmp/ci-logs/
          retention-days: 7
          if-no-files-found: ignore

      - name: Tear down
        if: always()
        run: make clean
