site_name: CAPTIA Synthetic Data BMS
site_description: Generador de datos sintéticos para Building Management Systems (CAPTIA)
site_url: https://captiatechnology.github.io/CAPTIA-SYNTHETIC-DATA-BMS/
repo_url: https://github.com/captiatechnology/CAPTIA-SYNTHETIC-DATA-BMS
repo_name: captiatechnology/CAPTIA-SYNTHETIC-DATA-BMS
edit_uri: edit/main/docs/
copyright: "Copyright &copy; 2026 CAPTIA Technology — Apache 2.0"

theme:
  name: material
  language: es
  font:
    text: Inter
    code: JetBrains Mono
  palette:
    # Light mode — paleta corporativa CAPTIA (azul #2451FF + verde IA #0CE879)
    - media: "(prefers-color-scheme: light)"
      scheme: default
      primary: custom
      accent: custom
      toggle:
        icon: material/brightness-7
        name: Cambiar a modo oscuro
    # Dark mode
    - media: "(prefers-color-scheme: dark)"
      scheme: slate
      primary: custom
      accent: custom
      toggle:
        icon: material/brightness-4
        name: Cambiar a modo claro
  features:
    - navigation.instant
    - navigation.tracking
    - navigation.tabs
    - navigation.tabs.sticky
    - navigation.sections
    - navigation.expand
    - navigation.top
    - navigation.footer
    - navigation.indexes
    - search.suggest
    - search.highlight
    - search.share
    - content.code.copy
    - content.code.annotate
    - content.tabs.link
    - toc.follow
  icon:
    repo: fontawesome/brands/github

extra_css:
  - assets/stylesheets/extra.css

markdown_extensions:
  - admonition
  - attr_list
  - def_list
  - footnotes
  - md_in_html
  - tables
  - toc:
      permalink: true
      toc_depth: 3
  - pymdownx.details
  - pymdownx.highlight:
      anchor_linenums: true
      line_spans: __span
      pygments_lang_class: true
  - pymdownx.inlinehilite
  - pymdownx.keys
  - pymdownx.snippets
  - pymdownx.superfences:
      custom_fences:
        - name: mermaid
          class: mermaid
          format: !!python/name:pymdownx.superfences.fence_code_format
  - pymdownx.tabbed:
      alternate_style: true
  - pymdownx.tasklist:
      custom_checkbox: true
  # LaTeX / MathJax para documentación doctoral con fórmulas
  - pymdownx.arithmatex:
      generic: true

extra_javascript:
  - assets/javascripts/mathjax.js
  - https://polyfill.io/v3/polyfill.min.js?features=es6
  - https://cdn.jsdelivr.net/npm/mathjax@3/es5/tex-mml-chtml.js

plugins:
  - search:
      lang:
        - es
        - en

nav:
  - Inicio: index.md
  - Empezar:
    - Introducción: getting-started/index.md
    - Visión general: getting-started/overview.md
    - Setup local: getting-started/local-setup.md
    - Notebooks: getting-started/notebooks.md
    - Quickstart: QUICKSTART.md
    - Troubleshooting: TROUBLESHOOTING.md
  - Arquitectura:
    - Visión general: architecture/index.md
    - Medallion: architecture/medallion.md
    - CENTINELA+: architecture/centinela-overview.md
    - Schema CAPTIA: architecture/captia-schema.md
    - Flujo de datos: architecture/data-flow.md
  - Casos de uso:
    - Índice: use-cases/index.md
    - A — Pipeline IoT: use-cases/case-a-pipeline-iot.md
    - B — Forecast consumo: use-cases/case-b-energy-forecasting.md
    - C — Anomalías HVAC: use-cases/case-c-hvac-anomaly.md
    - D — IAQ + ocupación: use-cases/case-d-iaq-occupancy.md
    - E — Meteo & solar: use-cases/case-e-weather-solar.md
    - F — MLOps: use-cases/case-f-mlops.md
    - G — Calidad con agentes: use-cases/case-g-data-quality-agents.md
    - H — RAG + Chatbot: use-cases/case-h-rag-chatbot.md
    - I — Spark vs Pandas: use-cases/case-i-spark-pandas.md
    - J — Tráfico + YOLO: use-cases/case-j-traffic-yolo.md
  - Notebooks:
    - Índice: notebooks/index.md
    - Cómo ejecutar: notebooks/how-to-run.md
    - Mapa de notebooks: notebooks/notebook-map.md
  - Contratos:
    - Schema InfluxDB: contracts/influx-schema.md
    - Topics MQTT: contracts/mqtt-topics.md
    - Catálogo variables: contracts/variable-catalog.md
    - Capas Medallion: contracts/medallion-layers.md
  - Validación:
    - End-to-end: validation/e2e.md
    - Calidad de datos: validation/data-quality.md
    - Realismo físico: validation/physical-realism.md
    - Validación ML: validation/ml-validation.md
  - Modelo físico:
    - Resumen: physical-model/index.md
    - Realismo (auditoría): audit/PHYSICAL_REALISM_REPORT.md
  - Especificaciones:
    - Inicio: specs/index.md
    - SDD synthetic-bms: specs/synthetic-bms/STATUS.md
    - Physics validation: specs/digital-twin-bms-physics-validation/STATUS.md
  - Auditoría:
    - Índice: audit/index.md
    - Estado: audit/STATUS.md
    - Mapa repo: audit/00-repo-map.md
    - Consistencia BMS↔CAPTIA-connect: audit/CONSISTENCY_MATRIX.md
    - Plan docs: audit/DOCS_RESTRUCTURE_PLAN.md
    - Matriz de casos de uso: audit/USE_CASE_MATRIX.md
    - Plan de notebooks: audit/NOTEBOOK_PLAN.md
    - Reporte de docs: audit/DOCS_REPORT.md
    - Reporte top 20: audit/AUDIT_REPORT.md
    - Validación E2E: audit/E2E_VALIDATION_REPORT.md
    - Realismo físico: audit/PHYSICAL_REALISM_REPORT.md
    - Plan de acción: audit/ACTION_PLAN.md
  - Operaciones:
    - Troubleshooting: operations/troubleshooting.md
    - Variables de entorno: operations/environment.md
    - Docker: operations/docker.md
    - Inicialización .env: operations/init-env.md
    - Healthchecks: operations/healthchecks.md
    - Dependabot: operations/dependabot.md
  - CAPTIA Corporate:
    - Presentación: captia-corporate/index.md
    - Resumen ejecutivo (1 pág): captia-corporate/executive-summary.md
    - Business case (ROI detallado): captia-corporate/business-case.md
  - Decisiones:
    - Índice ADR: decisions/index.md
  - Archivo:
    - Índice: archive/index.md
    - CENTINELA Guía Alumnos v4: archive/CENTINELA_Guia_Alumnos_v4.md
    - Casos de uso (informe): archive/CAPTIA_Informe_CasosDeUso_DatosSinteticos.md
    - Arquitectura Medallion: archive/MEDALLION_Arquitectura_Guia_Referencia.md

extra:
  social:
    - icon: fontawesome/brands/github
      link: https://github.com/captia-technology/CAPTIA-SYNTHETIC-DATA-BMS
    - icon: fontawesome/solid/globe
      link: https://captiatechnology.com
      name: CAPTIA Technology
    - icon: fontawesome/solid/envelope
      link: mailto:jaime.sendra@captiatechnology.com
      name: Contacto
  generator: false

# strict deshabilitado por ahora: hay enlaces relativos a code paths
# (vendor/, modules/, etc.) que mkdocs trata como archivos rotos.
# El workflow de GitHub Pages compila sin --strict para esa razón.
strict: false
