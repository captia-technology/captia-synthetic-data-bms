# =============================================================================
# CAPTIA-SYNTHETIC-DATA-BMS — observability compose
# Servicios: prometheus, loki, promtail.
# =============================================================================

name: captia-bms

services:
  prometheus:
    image: prom/prometheus:v2.49.1
    container_name: captia-bms-prometheus
    restart: unless-stopped
    ports:
      - "${PROMETHEUS_PORT_HOST:-9090}:9090"
    # H-22 / PATCH 006: permitir scrape al generator cuando corre en host
    # (modo demo sin build de imagen). En Windows/Mac host.docker.internal
    # existe nativamente; en Linux se mapea a host-gateway.
    extra_hosts:
      - "host.docker.internal:host-gateway"
    volumes:
      - ../infra/prometheus/prometheus.yml:/etc/prometheus/prometheus.yml:ro
      - ../infra/prometheus/rules:/etc/prometheus/rules:ro
      - prometheus_data:/prometheus
    command:
      - --config.file=/etc/prometheus/prometheus.yml
      - --storage.tsdb.retention.time=7d
      - --storage.tsdb.path=/prometheus
      - --web.enable-lifecycle
    healthcheck:
      test: ["CMD", "wget", "-qO-", "http://localhost:9090/-/healthy"]
      interval: 30s
      timeout: 5s
      retries: 3
    mem_limit: 512m
    cpus: 0.5

  loki:
    image: grafana/loki:2.9.4
    container_name: captia-bms-loki
    restart: unless-stopped
    ports:
      - "${LOKI_PORT_HOST:-3100}:3100"
    volumes:
      - ../infra/loki/loki-config.yml:/etc/loki/loki-config.yml:ro
      - loki_data:/loki
    command: ["-config.file=/etc/loki/loki-config.yml"]
    healthcheck:
      test: ["CMD-SHELL", "wget -qO- http://localhost:3100/ready | grep -q ready || exit 1"]
      interval: 30s
      timeout: 5s
      retries: 5
      start_period: 60s
    mem_limit: 512m
    cpus: 0.5

  promtail:
    image: grafana/promtail:2.9.4
    container_name: captia-bms-promtail
    restart: unless-stopped
    depends_on:
      loki:
        condition: service_healthy
    volumes:
      - ../infra/promtail/promtail-config.yml:/etc/promtail/promtail-config.yml:ro
      - /var/run/docker.sock:/var/run/docker.sock:ro
      - /var/lib/docker/containers:/var/lib/docker/containers:ro
    command: ["-config.file=/etc/promtail/promtail-config.yml"]
    mem_limit: 256m
    cpus: 0.5

  # MQTTX Web — SPA cliente MQTT servida en HTTP. Conecta vía WebSocket
  # desde el navegador del usuario al broker en ws://localhost:9102/mqtt.
  # No conecta server-side: solo sirve assets estáticos.
  mqttx-web:
    image: emqx/mqttx-web:v1.13.0
    container_name: captia-bms-mqttx-web
    restart: unless-stopped
    ports:
      - "${MQTTX_WEB_PORT_HOST:-8083}:80"
    # http-server escucha en IPv4 0.0.0.0:80; localhost resuelve a ::1 (no
     # responde). Usar 127.0.0.1 explícito.
    healthcheck:
      test: ["CMD-SHELL", "wget -qO- http://127.0.0.1/ | grep -q MQTT || exit 1"]
      interval: 30s
      timeout: 5s
      retries: 3
      start_period: 10s
    mem_limit: 64m
    cpus: 0.25

volumes:
  prometheus_data:
  loki_data:

networks:
  default:
    name: ${CAPTIA_NETWORK_NAME:-captia-network}
