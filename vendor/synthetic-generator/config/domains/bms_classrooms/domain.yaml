# BMS Classrooms Domain Configuration
# Ref: docs/specs/domain-adapters.md Section 2

n_aulas: 70

calendar:
  school_start_month: 9
  school_end_month: 6
  holidays:
    - "2026-12-25"
    - "2026-01-01"
    - "2026-01-06"

schedule:
  aula_capacity_mean: 28
  aula_capacity_std: 6
  aula_utilization_mean: 0.75
  aula_utilization_std: 0.10
  day_to_day_variability: 0.12
  slots:
    - start: "08:00"
      end: "14:00"
      p_occupancy: 0.85
    - start: "15:00"
      end: "21:00"
      p_occupancy: 0.45

physics:
  outdoor_temp:
    mean_annual: 17.0
    amplitude: 9.5
    daily_noise_std: 1.0
  indoor:
    initial_temp: 20.5
    thermal_mass: 0.05
    heating_power: 1.0
    cooling_effect: 0.5
  co2:
    base_ppm: 420
    per_person_ppm: 18.5
    decay_rate: 0.03
  humidity:
    base_rh: 50.0
    outdoor_influence: 0.3
  noise:
    base_db: 35.0
    per_person_db: 1.2
  light:
    artificial_lux: 500
    daylight_factor: 0.6
