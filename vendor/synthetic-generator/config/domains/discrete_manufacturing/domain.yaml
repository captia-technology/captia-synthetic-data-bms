# Discrete Manufacturing Domain Configuration
# Ref: docs/specs/domain-adapters.md Section 4

domain:
  id: "discrete_manufacturing"
  name: "Faraone Iberica - Sheet metal plant"
  version: "1.0.0"

shift_calendar:
  weekend_mode: "full"        # SA/SU run same shifts as weekdays
  shifts:
    - name: morning
      start: "06:00"
      end: "14:00"
      days: ["MO", "TU", "WE", "TH", "FR", "SA", "SU"]
    - name: afternoon
      start: "14:00"
      end: "22:00"
      days: ["MO", "TU", "WE", "TH", "FR", "SA", "SU"]
  breaks:
    - name: morning_break
      start: "10:00"
      end: "10:15"
    - name: afternoon_break
      start: "18:00"
      end: "18:15"

machine_archetypes:
  CUTTING_MANUAL:
    cycle_time_ideal_s: { min: 45, max: 75 }
    idle_power_kw: { min: 0.5, max: 1.5 }
    run_power_kw: { min: 3, max: 8 }
    pieces_per_cycle: 1
    has_pneumatics: false
    fault_base_rate_per_hour: 0.01
    microstop_rate_per_hour: 0.3
    vibration: { base_rms_mm_s: 0.5, load_gain: 1.0, wear_gain: 0.5 }

  CNC_MILL:
    cycle_time_ideal_s: { min: 60, max: 180 }
    idle_power_kw: { min: 2, max: 4 }
    run_power_kw: { min: 8, max: 25 }
    pieces_per_cycle: 1
    has_pneumatics: true
    has_coolant: true
    fault_base_rate_per_hour: 0.02
    microstop_rate_per_hour: 0.4
    vibration: { base_rms_mm_s: 1.2, load_gain: 2.0, wear_gain: 1.5 }

  PRESS_EMBUTIDORA:
    cycle_time_ideal_s: { min: 15, max: 30 }
    idle_power_kw: { min: 3, max: 5 }
    run_power_kw: { min: 15, max: 40 }
    pieces_per_cycle: 1
    has_pneumatics: true
    startup_spike_factor: 2.0
    fault_base_rate_per_hour: 0.015
    vibration: { base_rms_mm_s: 2.0, load_gain: 2.5, wear_gain: 1.0 }

  WELDING_ROBOT:
    cycle_time_ideal_s: { min: 20, max: 45 }
    idle_power_kw: { min: 2, max: 4 }
    run_power_kw: { min: 10, max: 30 }
    pieces_per_cycle: 11
    has_pneumatics: true
    fault_base_rate_per_hour: 0.03
    vibration: { base_rms_mm_s: 0.8, load_gain: 1.2, wear_gain: 0.8 }

  BENDER:
    cycle_time_ideal_s: { min: 30, max: 60 }
    idle_power_kw: { min: 1, max: 3 }
    run_power_kw: { min: 5, max: 15 }
    pieces_per_cycle: 1
    has_pneumatics: false
    fault_base_rate_per_hour: 0.01
    vibration: { base_rms_mm_s: 1.5, load_gain: 1.8, wear_gain: 1.2 }

  WRAPPER_PACKAGING:
    cycle_time_ideal_s: { min: 10, max: 20 }
    idle_power_kw: { min: 0.5, max: 1.5 }
    run_power_kw: { min: 2, max: 5 }
    pieces_per_cycle: 1
    has_pneumatics: true
    fault_base_rate_per_hour: 0.005
    vibration: { base_rms_mm_s: 0.3, load_gain: 0.5, wear_gain: 0.3 }

  LASER_CUTTER:
    cycle_time_ideal_s: { min: 30, max: 90 }
    idle_power_kw: { min: 3, max: 6 }
    run_power_kw: { min: 15, max: 45 }
    pieces_per_cycle: 1
    has_pneumatics: false
    has_coolant: true
    fault_base_rate_per_hour: 0.025
    vibration: { base_rms_mm_s: 0.4, load_gain: 0.6, wear_gain: 0.4 }

  CUTTING_AUTO:
    cycle_time_ideal_s: { min: 20, max: 40 }
    idle_power_kw: { min: 1, max: 2 }
    run_power_kw: { min: 4, max: 12 }
    pieces_per_cycle: 1
    has_pneumatics: true
    fault_base_rate_per_hour: 0.015
    vibration: { base_rms_mm_s: 1.0, load_gain: 1.5, wear_gain: 1.0 }

product_catalog:
  REF-001:
    name: "Bracket A"
    weight_kg: 0.5
  REF-002:
    name: "Panel B"
    weight_kg: 2.3
  REF-003:
    name: "Frame C"
    weight_kg: 5.1
