# Industrial Refrigeration — Variable Catalog
# Source of truth for metric_kind (downsampling policy per signal type)
#
# storage_mode (controls Telegraf dedup + output routing):
#   continuous (default)  → write every sample to `telemetry` bucket
#   on_change             → Telegraf dedup, write only value changes to `state_events` bucket

asset_types:
  # ═══════════════════════════════════════════════════════════════
  cold_room:
    variables:
      - name: temperature
        data_type: float
        unit: "°C"
        point_type: sensor
        metric_kind: analog_gauge
        category: ENVIRONMENTAL
        range: [-40.0, 30.0]

      - name: temperature_setpoint
        data_type: float
        unit: "°C"
        point_type: setpoint
        metric_kind: setpoint_step
        storage_mode: on_change
        category: HVAC
        range: [-40.0, 20.0]

      - name: evap1_cooling_cmd
        data_type: boolean
        point_type: actuator
        metric_kind: bool_state
        storage_mode: on_change
        category: HVAC

      - name: evap1_defrost_cmd
        data_type: boolean
        point_type: actuator
        metric_kind: bool_state
        storage_mode: on_change
        category: HVAC

      - name: evap2_cooling_cmd
        data_type: boolean
        point_type: actuator
        metric_kind: bool_state
        storage_mode: on_change
        category: HVAC
        optional: true

      - name: evap2_defrost_cmd
        data_type: boolean
        point_type: actuator
        metric_kind: bool_state
        storage_mode: on_change
        category: HVAC
        optional: true

  # ═══════════════════════════════════════════════════════════════
  compressor_rack:
    variables:
      - name: rack_suction_pressure
        data_type: float
        unit: bar
        point_type: sensor
        metric_kind: analog_gauge
        category: HVAC
        range: [0.0, 10.0]

      - name: rack_discharge_pressure
        data_type: float
        unit: bar
        point_type: sensor
        metric_kind: analog_gauge
        category: HVAC
        range: [0.0, 60.0]

      - name: rack_suction_temperature
        data_type: float
        unit: "°C"
        point_type: sensor
        metric_kind: analog_gauge
        category: HVAC
        range: [-60.0, 30.0]

      - name: rack_discharge_temperature
        data_type: float
        unit: "°C"
        point_type: sensor
        metric_kind: analog_gauge
        category: HVAC
        range: [-40.0, 120.0]

      - name: compressor_2_status
        data_type: boolean
        point_type: actuator
        metric_kind: bool_state
        storage_mode: on_change
        category: HVAC

      - name: compressor_3_status
        data_type: boolean
        point_type: actuator
        metric_kind: bool_state
        storage_mode: on_change
        category: HVAC

      - name: compressor_4_status
        data_type: boolean
        point_type: actuator
        metric_kind: bool_state
        storage_mode: on_change
        category: HVAC

      - name: compressor_5_status
        data_type: boolean
        point_type: actuator
        metric_kind: bool_state
        storage_mode: on_change
        category: HVAC

      - name: compressor_6_status
        data_type: boolean
        point_type: actuator
        metric_kind: bool_state
        storage_mode: on_change
        category: HVAC

      - name: compressor_8_status
        data_type: boolean
        point_type: actuator
        metric_kind: bool_state
        storage_mode: on_change
        category: HVAC

  # ═══════════════════════════════════════════════════════════════
  condenser:
    variables:
      - name: condenser_discharge_pressure
        data_type: float
        unit: bar
        point_type: sensor
        metric_kind: analog_gauge
        category: HVAC
        range: [0.0, 70.0]

      - name: condenser_discharge_temperature
        data_type: float
        unit: "°C"
        point_type: sensor
        metric_kind: analog_gauge
        category: HVAC
        range: [-30.0, 90.0]

      - name: condenser_vfd_frequency
        data_type: float
        unit: Hz
        point_type: actuator
        metric_kind: analog_gauge
        category: HVAC
        range: [0.0, 60.0]

  # ═══════════════════════════════════════════════════════════════
  separator:
    # Used for both separator_high and separator_low
    variables:
      - name: separator_level
        data_type: float
        unit: "%"
        point_type: sensor
        metric_kind: analog_gauge
        category: HVAC
        range: [0.0, 110.0]

      - name: separator_pressure
        data_type: float
        unit: bar
        point_type: sensor
        metric_kind: analog_gauge
        category: HVAC
        range: [0.0, 70.0]

      - name: separator_temperature
        data_type: float
        unit: "°C"
        point_type: sensor
        metric_kind: analog_gauge
        category: HVAC
        range: [-80.0, 120.0]

      - name: dp_pump_b1
        data_type: float
        unit: bar
        point_type: sensor
        metric_kind: analog_gauge
        category: HVAC
        range: [0.0, 10.0]

      - name: dp_pump_b2
        data_type: float
        unit: bar
        point_type: sensor
        metric_kind: analog_gauge
        category: HVAC
        range: [0.0, 10.0]

  # ═══════════════════════════════════════════════════════════════
  separator_pumps:
    variables:
      - name: pump_b1_high_status
        data_type: boolean
        point_type: actuator
        metric_kind: bool_state
        storage_mode: on_change
        category: HVAC

      - name: pump_b1_low_status
        data_type: boolean
        point_type: actuator
        metric_kind: bool_state
        storage_mode: on_change
        category: HVAC

      - name: pump_b2_high_status
        data_type: boolean
        point_type: actuator
        metric_kind: bool_state
        storage_mode: on_change
        category: HVAC

      - name: pump_b2_low_status
        data_type: boolean
        point_type: actuator
        metric_kind: bool_state
        storage_mode: on_change
        category: HVAC

  # ═══════════════════════════════════════════════════════════════
  power_meter:
    variables:
      - name: power_active_total
        data_type: float
        unit: kW
        point_type: sensor
        metric_kind: analog_gauge
        category: ENERGY
        range: [0.0, 2000.0]

      - name: power_apparent_total
        data_type: float
        unit: kVA
        point_type: sensor
        metric_kind: analog_gauge
        category: ENERGY
        range: [0.0, 4000.0]

      - name: power_factor
        data_type: float
        point_type: sensor
        metric_kind: analog_gauge
        category: ENERGY
        range: [0.0, 1.0]

      - name: energy_active
        data_type: float
        unit: kWh
        point_type: sensor
        metric_kind: counter
        counter_wire: cumulative_monotonic
        category: ENERGY

      - name: power_active_phase_a
        data_type: float
        unit: kW
        point_type: sensor
        metric_kind: analog_gauge
        category: ENERGY
        range: [0.0, 1000.0]

      - name: power_active_phase_b
        data_type: float
        unit: kW
        point_type: sensor
        metric_kind: analog_gauge
        category: ENERGY
        range: [0.0, 1000.0]

      - name: power_active_phase_c
        data_type: float
        unit: kW
        point_type: sensor
        metric_kind: analog_gauge
        category: ENERGY
        range: [0.0, 1000.0]

  # ═══════════════════════════════════════════════════════════════
  weather:
    variables:
      - name: outdoor_temperature_2m
        data_type: float
        unit: "°C"
        point_type: sensor
        metric_kind: analog_gauge
        category: EXTERNAL
        range: [-10.0, 45.0]

      - name: outdoor_relative_humidity_2m
        data_type: float
        unit: "%"
        point_type: sensor
        metric_kind: analog_gauge
        category: EXTERNAL
        range: [0.0, 100.0]

      - name: outdoor_precipitation
        data_type: float
        unit: mm
        point_type: sensor
        metric_kind: analog_gauge
        category: EXTERNAL
        range: [0.0, 200.0]

      - name: outdoor_wind_speed_10m
        data_type: float
        unit: m/s
        point_type: sensor
        metric_kind: analog_gauge
        category: EXTERNAL
        range: [0.0, 50.0]

      - name: outdoor_wind_direction_10m
        data_type: float
        unit: deg
        point_type: sensor
        metric_kind: analog_gauge
        category: EXTERNAL
        range: [0.0, 360.0]
