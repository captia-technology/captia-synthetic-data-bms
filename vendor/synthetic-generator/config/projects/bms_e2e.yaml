# =============================================================================
# BMS E2E — IES Simarro Classroom Building Monitoring
# Purpose: End-to-end validation of BMS Generator -> MQTT -> Telegraf -> InfluxDB
# Usage: GENERATOR_CONFIG=/app/config/projects/bms_e2e.yaml
#
# Classrooms (70): AULA01-AULA70 (typical Spanish high school)
#
# Signals per classroom (16):
#   ENVIRONMENTAL (6): temperature, humidity, co2, iaq_index, noise, illuminance
#   OCCUPANCY (2): occupancy, presence_pir
#   HVAC (4): thermostat_setpoint, hvac_mode, hvac_enable, heating_valve_pos
#   ELECTRICAL (4): relay_1..4
#   EXTERNAL (2): outdoor_temp, daylight_lux (shared across classrooms)
#   ENERGY (2): power, energy
# =============================================================================

project:
  namespace: "captia"
  site_id: "ies_simarro"
  modo: "synthetic"
  schema_version: "v0.1"

simulation:
  timezone: "Europe/Madrid"
  seed: 100
  start: "2026-02-06T06:00:00"
  end: "2026-02-06T22:00:00"
  freq: "10s"
  n_aulas: 70

domain:
  id: "bms_classrooms"
  config_path: "/app/config/domains/bms_classrooms/domain.yaml"

phases:
  backfill:
    enabled: true
  live:
    enabled: true
    rate_points_per_sec: 8.0
    lookahead_hours: 1
    regenerate_on_exhaustion: true

perturbations:
  jitter_ms: 30.0
  duplicate_probability: 0.0
  out_of_order_probability: 0.001
  gap_probability: 0.0
  gap_duration_points: [1, 3]

anomalies:
  p_missing: 0.001
  p_outlier: 0.001
  burst_missing_prob_per_day: 0.0
  burst_duration_range: [2, 10]

sinks:
  - type: mqtt
    config:
      broker_url: "tcp://mosquitto:1883"
      captia_env: "dev"
      qos: 0
      payload_format: "json"
  - type: stdout
    config:
      enabled: false

output:
  format: "long"
  include_quality: true
  include_mqtt: true
