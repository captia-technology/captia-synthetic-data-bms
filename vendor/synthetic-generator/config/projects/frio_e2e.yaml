# =============================================================================
# Industrial Refrigeration E2E — Frigorificos Sebastia (Grasso plant)
# Purpose: End-to-end validation of Frio Generator -> MQTT -> Telegraf -> InfluxDB
# Usage: GENERATOR_CONFIG=/app/config/projects/frio_e2e.yaml
#
# Assets:
#   Cold rooms (10): CAMARA1-CAMARA10
#   Compressor rack (6 compressors): COMP_RACK
#   Condenser: CONDENSER
#   Separators: SEP_HIGH, SEP_LOW
#
# Signals:
#   Per cold room (6-8): chamber_temp, setpoint, door_open, defrost_active,
#                         cooling_demand_kw, evap_fan_hz, etc.
#   Compressor rack: suction_pressure, discharge_pressure, oil_temp,
#                    running_compressors, total_power_kw, cop
#   Condenser: fan_hz, air_inlet_temp, pressure, subcooling
#   Separators: level, pressure, pump_running
# =============================================================================

project:
  namespace: "captia"
  site_id: "frigorificos_sebastia"
  modo: "synthetic"
  schema_version: "v0.1"

simulation:
  timezone: "Europe/Madrid"
  seed: 200
  start: "2026-02-06T00:00:00"
  end: "2026-02-06T23:59:59"
  freq: "5s"

domain:
  id: "industrial_refrigeration"
  config_path: "/app/config/domains/industrial_refrigeration/domain.yaml"

phases:
  backfill:
    enabled: true
  live:
    enabled: true
    rate_points_per_sec: 6.0
    lookahead_hours: 1
    regenerate_on_exhaustion: true

perturbations:
  jitter_ms: 20.0
  duplicate_probability: 0.0
  out_of_order_probability: 0.001
  gap_probability: 0.0
  gap_duration_points: [1, 3]

anomalies:
  p_missing: 0.001
  p_outlier: 0.002
  burst_missing_prob_per_day: 0.0
  burst_duration_range: [2, 10]

sinks:
  - type: mqtt
    config:
      broker_url: "tcp://mosquitto:1883"
      captia_env: "dev"
      qos: 0
      payload_format: "json"
  - type: stdout
    config:
      enabled: false

output:
  format: "long"
  include_quality: true
  include_mqtt: true
