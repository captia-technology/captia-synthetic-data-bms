[build-system]
requires = ["hatchling"]
build-backend = "hatchling.build"

[project]
name = "synthetic-generator"
version = "0.1.0"
description = "CAPTIA-connect synthetic data generator — modular, multi-domain"
requires-python = ">=3.10"
dependencies = [
    "numpy>=1.24",
    "pandas>=2.0",
    "pydantic>=2.0",
    "pyyaml>=6.0",
    "paho-mqtt>=2.0",
    "tqdm>=4.66",
]

[project.optional-dependencies]
dev = [
    "pytest>=7.0",
    "pytest-timeout>=2.0",
    "ruff>=0.4",
]

[project.scripts]
synthetic-generator = "synthetic_generator.cli:main"

[tool.hatch.build.targets.wheel]
packages = ["src/synthetic_generator"]

[tool.pytest.ini_options]
testpaths = ["tests"]
markers = [
    "unit: Unit tests (fast, no external deps)",
    "integration: Integration tests (may need external services)",
    "performance: Throughput benchmarks",
    "snapshot: Determinism snapshot tests",
]

[tool.ruff]
src = ["src"]
line-length = 120
