# =============================================================================
# Industrial Refrigeration — Baseline Scenario
# Ref: docs/specs/config-schema.md Section 4.2
# =============================================================================

project:
  namespace: "frio_industrial"
  site_id: "frigorificos_sebastia"
  modo: "synthetic"
  schema_version: "v0.1"

simulation:
  timezone: "Europe/Madrid"
  seed: 42
  start: "2026-01-01"
  end: "2026-01-07"
  freq: "5min"

domain:
  id: "industrial_refrigeration"
  config_path: "../config/domains/industrial_refrigeration/domain.yaml"

phases:
  backfill:
    enabled: true
  live:
    enabled: false

anomalies:
  p_missing: 0.0008
  p_outlier: 0.0003

sinks:
  - type: file
    config:
      path: "outputs/refrigeration_baseline.csv"
      format: csv_long
