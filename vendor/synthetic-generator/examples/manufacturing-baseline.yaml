# =============================================================================
# Discrete Manufacturing — Baseline Scenario
# Ref: docs/specs/config-schema.md Section 4.3
# =============================================================================

project:
  namespace: "factory"
  site_id: "FARAONE_IBERICA"
  modo: "synthetic"
  schema_version: "v0.1"

simulation:
  timezone: "Europe/Madrid"
  seed: 42
  start: "2026-01-20T00:00:00"
  end: "2026-01-20T23:59:55"
  freq: "5s"
  n_machines: 8

domain:
  id: "discrete_manufacturing"
  config_path: "../config/domains/discrete_manufacturing/domain.yaml"

phases:
  backfill:
    enabled: true
  live:
    enabled: false

sinks:
  - type: file
    config:
      path: "outputs/manufacturing_baseline.csv"
      format: csv_long
